<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Transactions</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <!-- header section design with logo START -->
     <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">

            <!-- header left side START -->
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="logo">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$<span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <!-- header left side END -->

            <!-- header right side START -->
            <div class="right">
                <a href="/index.html" class="text-neutral/50 btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log Out</a>
            </div>
            <!-- header right side END -->
        </section>
     </header>
     <!-- header section end -->

     <!-- Welcome section Start -->
     <section class="w-11/12 mx-auto py-10 space-y-5">
        <h1 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h1>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <!-- Welcome section End -->

        <!-- buttons section START-->
         <div class="buttons grid grid-cols-3 gap-3">
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-1.png" alt="Add Money button">
                <p>Add Money</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-2.png" alt="Cashout">
                <p>Cashout</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-3.png" alt="Transfer Money">
                <p>Transfer Money</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-4.png" alt="Get Bonus">
                <p>Get Bonus</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-5.png" alt="Pay Bill">
                <p>Pay Bill</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-6.png" alt="Transactions">
                <p>Transactions</p>
            </button>
         </div>
     </section>
     <!-- buttons section END-->
</body>
</html>
